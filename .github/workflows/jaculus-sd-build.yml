name: Build Jaculus SD firmware

on:
  push:
    branches:
      - main
    paths:
      - 'build-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helper repo
        uses: actions/checkout@v4

      - name: Clone pinned Jaculus 0.2.4 source
        run: |
          git clone --recursive https://github.com/jaculus-org/Jaculus-esp32.git firmware
          cd firmware
          git checkout 4c1a59d6973fd61bc603b5867aac459db789aa9b
          git submodule update --init --recursive

      - name: Add pinned local Jaculus-machine component
        run: |
          git clone https://github.com/jaculus-org/Jaculus-machine.git jaculus-machine-source
          cd jaculus-machine-source
          git checkout 9856d31ec3b6499ad7b1154e6e408cc7cb952165
          cd ..
          mkdir -p firmware/components/jac-machine
          cp -a jaculus-machine-source/src/. firmware/components/jac-machine/

      - name: Apply stable Saturn SD integration
        run: |
          python3 patch_jaculus_sd.py
          python3 patch_jaculus_sd_stable.py

      - name: Build ESP32-S3 Octal PSRAM package
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.2
          target: esp32s3
          path: firmware
          command: bash scripts/build-esp32-s3-generic-octal.sh

      - name: Verify package
        run: |
          ls -lh firmware/out/
          tar -tzf firmware/out/ESP32-S3-Generic-OctalPSRAM.tar.gz

      - name: Upload flashable firmware
        uses: actions/upload-artifact@v4
        with:
          name: Jaculus-0.2.4-Saturn-SD-Stable
          path: firmware/out/ESP32-S3-Generic-OctalPSRAM.tar.gz
          if-no-files-found: error

      - name: Publish firmware into repository
        run: |
          mkdir -p firmware-output
          cp firmware/out/ESP32-S3-Generic-OctalPSRAM.tar.gz firmware-output/Jaculus-0.2.4-Saturn-SD-Stable.tar.gz
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firmware-output/Jaculus-0.2.4-Saturn-SD-Stable.tar.gz
          git commit -m "Publish stable Jaculus Saturn SD firmware" || exit 0
          git push
